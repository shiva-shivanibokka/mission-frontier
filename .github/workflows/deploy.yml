name: Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    # Sync LeetCode + redeploy a few times a day (UTC). This is what auto-fills
    # your solved problems and the daily quota.
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Sync LeetCode (accumulate solved problems)
        run: node scripts/sync-leetcode.mjs
        continue-on-error: true

      - name: Commit refreshed problems.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/problems.json
          git commit -m "Auto-sync LeetCode" || echo "no changes"
          git push || echo "nothing to push"

      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
