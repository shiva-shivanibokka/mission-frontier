name: Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    # Sync LeetCode + redeploy a few times a day (UTC). This is what auto-fills
    # your solved problems and the daily quota.
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# One deploy at a time, but never cancel an in-progress deploy — let it finish so
# a code push is never silently killed by the scheduled LeetCode auto-commit. A
# newer run just queues; GitHub keeps only the latest pending one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Sync LeetCode (accumulate solved problems)
        run: node scripts/sync-leetcode.mjs
        continue-on-error: true

      - name: Commit refreshed problems.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/problems.json
          git commit -m "Auto-sync LeetCode" || echo "no changes"
          git push || echo "nothing to push"

      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.a1.outputs.page_url || steps.a2.outputs.page_url || steps.a3.outputs.page_url }}
    steps:
      # Retry deploy-pages up to 3x with backoff — it occasionally returns a
      # transient "Deployment failed, try again later" from the Pages backend.
      - id: a1
        name: Deploy to GitHub Pages (attempt 1)
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.a1.outcome == 'failure'
        run: sleep 20
      - id: a2
        name: Deploy to GitHub Pages (attempt 2)
        if: steps.a1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.a1.outcome == 'failure' && steps.a2.outcome == 'failure'
        run: sleep 30
      - id: a3
        name: Deploy to GitHub Pages (attempt 3)
        if: steps.a1.outcome == 'failure' && steps.a2.outcome == 'failure'
        uses: actions/deploy-pages@v4
